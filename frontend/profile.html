<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite | Profile Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #fff5f0; min-height: 100vh; padding: 40px; display: flex; flex-direction: column; align-items: center; }

    nav { width: 100%; max-width: 1060px; background: rgba(255,255,255,0.82); backdrop-filter: blur(15px); padding: 14px 36px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.6); margin-bottom: 46px; }
    .nav-logo { font-size: 1.35rem; font-weight: 800; color: #4a041a; text-decoration: none; }
    .nav-logo span { background: linear-gradient(135deg,#f72585,#ffb703); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 26px; list-style: none; }
    .nav-links a { text-decoration: none; color: #8a6a76; font-size: 0.88rem; font-weight: 700; transition: 0.3s; }
    .nav-links a:hover { color: #f72585; }

    .settings-card { width: 100%; max-width: 760px; background: white; padding: 50px; border-radius: 48px; box-shadow: 0 18px 48px rgba(247,37,133,0.05); text-align: center; }
    .profile-upload { width: 110px; height: 110px; border-radius: 38px; background: linear-gradient(135deg,#f72585,#ffb703); margin: 0 auto 26px; display: flex; justify-content: center; align-items: center; font-size: 2.8rem; color: white; box-shadow: 0 10px 20px rgba(247,37,133,0.2); font-weight: 800; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 28px; }
    .input-group { text-align: left; }
    label { display: block; margin-bottom: 6px; font-weight: 800; color: #8a6a76; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 1px; }
    input { width: 100%; padding: 14px 18px; border-radius: 18px; border: 1px solid #ffdeeb; outline: none; font-size: 0.95rem; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; background: #fff9f7; transition: 0.3s; }
    input:focus { border-color: #f72585; background: white; }
    input:disabled { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }

    .save-btn { margin-top: 36px; width: 100%; padding: 16px; background: #4a041a; color: white; border: none; border-radius: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; font-size: 0.88rem; }
    .save-btn:hover { background: #f72585; transform: translateY(-2px); }

    .logout-btn { margin-top: 16px; width: 100%; padding: 13px; background: #fff0f6; color: #f72585; border: 1px solid #ffdeeb; border-radius: 16px; font-weight: 800; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
    .logout-btn:hover { background: #fce4d8; }

    .alert { padding: 11px 16px; border-radius: 12px; font-size: 0.83rem; font-weight: 700; margin-top: 14px; display: none; }
    .alert.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
  </style>
</head>
<body>
<nav>
  <a href="student-hub.html" class="nav-logo">SGMS <span>Elite</span></a>
  <ul class="nav-links">
    <li><a href="student-hub.html">Home</a></li>
    <li><a href="analytics.html">History</a></li>
    <li><a href="support.html">Support</a></li>
  </ul>
</nav>

<div class="settings-card">
  <div class="profile-upload" id="avatarDisplay">S</div>
  <h2 style="color:#4a041a;font-size:1.6rem;font-weight:800;">Profile Settings ✨</h2>
  <p style="color:#8a6a76;font-size:0.88rem;margin-top:6px;">Your account details from SIES GST Portal</p>

  <div class="form-grid">
    <div class="input-group"><label>Full Name</label><input type="text" id="fieldName" disabled></div>
    <div class="input-group"><label>PRN Number</label><input type="text" id="fieldPRN" disabled></div>
    <div class="input-group"><label>Email</label><input type="email" id="fieldEmail" disabled></div>
    <div class="input-group"><label>Department</label><input type="text" id="fieldDept" disabled></div>
  </div>

  <div id="alertBox" class="alert"></div>
  <button class="save-btn" onclick="showSaved()">Update Profile</button>
  <button class="logout-btn" onclick="logout()">Logout from this Device</button>
</div>

<script>
  const student = JSON.parse(sessionStorage.getItem('studentData') || '{}');
  if (!sessionStorage.getItem('studentToken')) { window.location.href = 'student-login.html'; }

  if (student.name) {
    document.getElementById('fieldName').value     = student.name;
    document.getElementById('fieldPRN').value      = student.prn   || '—';
    document.getElementById('fieldEmail').value    = student.email || '—';
    document.getElementById('fieldDept').value     = student.department || '—';
    document.getElementById('avatarDisplay').textContent = student.name.charAt(0).toUpperCase();
  }

  function showSaved() {
    const box = document.getElementById('alertBox');
    box.textContent = '✅ Profile saved! (To update data, please contact admin.)';
    box.className = 'alert success';
    setTimeout(() => { box.className = 'alert'; }, 4000);
  }

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
</script>
</body>
</html>
