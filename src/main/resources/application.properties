spring.application.name=SGMS
# Database connection settings
spring.datasource.url=jdbc:h2:mem:grievancedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enables the H2 Console so you can see your data in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allows Hibernate to create the tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://localhost:5432/grievance_db
spring.datasource.username=postgres
spring.datasource.password=yourpassword

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect